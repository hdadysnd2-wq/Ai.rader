<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#00e5ff">
<title>AI Radar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--card:rgba(17,24,39,.9);--accent:#00e5ff;--green:#00ff88;--red:#ff3366;--yellow:#ffd600;--purple:#b388ff;--text:#e8eaf6;--sec:#90a4ae;--border:rgba(0,229,255,.15)}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;-webkit-user-select:none;user-select:none}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .5s}
#loading.hide{opacity:0;pointer-events:none}
.spinner{width:56px;height:56px;border-radius:50%;border:3px solid rgba(0,229,255,.15);border-top-color:var(--accent);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.app{padding:8px 8px 20px}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:8px}
.header h1{font-size:.95rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:14px;font-size:.68rem;font-weight:600}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.5s ease-in-out infinite}
.video-box{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:8px}
.video-wrap{position:relative;width:100%;aspect-ratio:4/3;background:#000}
video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1)}
.hud{position:absolute;top:6px;left:8px;right:8px;display:flex;justify-content:space-between;pointer-events:none}
.hud-item{background:rgba(0,0,0,.65);padding:2px 7px;border-radius:5px;font-size:.6rem;color:var(--accent);border:1px solid rgba(0,229,255,.2)}
.controls{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px;background:rgba(0,0,0,.4);flex-wrap:wrap}
.btn{padding:9px 22px;border:none;border-radius:10px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit}
.btn-start{background:linear-gradient(135deg,var(--accent),#0091ea);color:#000}
.btn-stop{background:linear-gradient(135deg,var(--red),#d50000);color:#fff}
.sg{display:flex;align-items:center;gap:4px;font-size:.62rem;color:var(--sec)}
.sg input{width:55px;accent-color:var(--accent);height:18px}
.sg .v{color:var(--accent);width:18px;text-align:center;font-size:.65rem}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center}
.stat b{font-size:1.4rem;display:block;line-height:1.2}
.stat small{font-size:.58rem;color:var(--sec)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px}
.card-t{font-size:.78rem;font-weight:700;color:var(--sec);margin-bottom:8px}
#objList{display:flex;flex-direction:column;gap:5px;max-height:40vh;overflow-y:auto}
.oi{display:flex;align-items:center;gap:7px;padding:7px 10px;background:rgba(0,0,0,.3);border-radius:10px}
.empty{text-align:center;padding:24px;color:var(--sec)}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div style="font-size:1.3rem;font-weight:700;color:#00e5ff;margin-top:16px">📡 AI Radar</div><div id="loadMsg" style="color:#90a4ae;font-size:.85rem;margin-top:8px">جاري تشغيل الكاميرا...</div></div>
<div class="app">
<div class="header"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:20px">📡</span><h1>AI Radar — رادار الحركة</h1></div><div class="badge" id="badge" style="background:rgba(0,255,136,.1);color:#00ff88;border:1px solid rgba(0,255,136,.3)"><div class="badge-dot"></div><span id="bTxt">جاهز</span></div></div>
<div class="video-box"><div class="video-wrap"><video id="vid" autoplay playsinline muted></video><canvas id="cvs"></canvas><div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,.01) 2px,rgba(0,229,255,.01) 4px)"></div><div class="hud"><div class="hud-item" id="fpsH">FPS: 0</div><div class="hud-item" id="resH">--</div></div></div>
<div class="controls"><button class="btn btn-start" id="tBtn" onclick="tog()">▶ بدء الرصد</button><div class="sg"><span>الحساسية</span><input type="range" min="10" max="80" value="30" oninput="S=+this.value;this.nextElementSibling.textContent=this.value"><span class="v">30</span></div><div class="sg"><span>الحجم</span><input type="range" min="200" max="3000" step="100" value="800" style="accent-color:#00ff88" oninput="M_=+this.value;this.nextElementSibling.textContent=this.value"><span class="v" style="color:#00ff88;width:28px">800</span></div></div></div>
<div class="stats"><div class="stat"><b id="sT" style="color:#00e5ff">0</b><small>أجسام</small></div><div class="stat"><b id="sA" style="color:#00ff88">0</b><small>متوسط السرعة</small></div><div class="stat"><b id="sM" style="color:#ffd600">0</b><small>أعلى سرعة</small></div></div>
<div class="card"><div class="card-t">🎯 الأجسام المرصودة</div><div id="objList"><div class="empty"><div style="font-size:2rem;opacity:.3;margin-bottom:6px">📡</div><div style="font-size:.78rem">اضغط بدء الرصد ثم حرّك جسماً</div></div></div></div>
</div>
<script>
const CO=["#00e5ff","#00ff88","#ff3366","#ffd600","#b388ff","#ff9100","#69f0ae","#448aff"],DA=["→","↗","↑","↖","←","↙","↓","↘"],DT=["يمين","يمين-أعلى","أعلى","يسار-أعلى","يسار","يسار-أسفل","أسفل","يمين-أسفل"];
let vid,cvs,cx_,oC,oX,dC,dX,pF=null,T={},ic=0,on=false,af,S=30,M_=800,fc=0,ft=Date.now();
const dA=a=>a===null?"●":DA[Math.round(((a+360)%360)/45)%8],dTx=a=>a===null?"ثابت":DT[Math.round(((a+360)%360)/45)%8];
async function init(){vid=document.getElementById('vid');cvs=document.getElementById('cvs');cx_=cvs.getContext('2d');try{const st=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:640},height:{ideal:480}}});vid.srcObject=st;await vid.play();const w=vid.videoWidth,h=vid.videoHeight;cvs.width=w;cvs.height=h;oC=document.createElement('canvas');oC.width=w;oC.height=h;oX=oC.getContext('2d',{willReadFrequently:true});dC=document.createElement('canvas');dC.width=w;dC.height=h;dX=dC.getContext('2d',{willReadFrequently:true});document.getElementById('resH').textContent=w+'×'+h;document.getElementById('loading').classList.add('hide')}catch(e){document.getElementById('loadMsg').innerHTML='<div style="color:#ff3366;margin-bottom:12px">لم يتم السماح بالكاميرا</div><button onclick="location.reload()" style="padding:10px 24px;background:#00e5ff;color:#000;border:none;border-radius:10px;font-weight:700;cursor:pointer">إعادة المحاولة</button>'}}
function tog(){const b=document.getElementById('tBtn'),bg=document.getElementById('badge'),bt=document.getElementById('bTxt');if(!on){on=true;pF=null;b.textContent='⏹ إيقاف';b.className='btn btn-stop';bg.style.cssText='background:rgba(0,229,255,.1);color:#00e5ff;border:1px solid rgba(0,229,255,.3)';bt.textContent='يرصد...';run()}else{on=false;if(af)cancelAnimationFrame(af);cx_.clearRect(0,0,cvs.width,cvs.height);T={};b.textContent='▶ بدء الرصد';b.className='btn btn-start';bg.style.cssText='background:rgba(0,255,136,.1);color:#00ff88;border:1px solid rgba(0,255,136,.3)';bt.textContent='جاهز';uUI([])}}
function fB(d,w,h){const m=new Uint8Array(w*h);for(let i=0;i<w*h;i++){const j=i*4;m[i]=(d[j]+d[j+1]+d[j+2])/3>S?1:0}const lb=new Int32Array(w*h),bl=[];let li=0;for(let y=0;y<h;y++)for(let x=0;x<w;x++){const i=y*w+x;if(m[i]&&!lb[i]){li++;let x0=x,x1=x,y0=y,y1=y,c=0;const s=[i];while(s.length){const ci=s.pop();if(ci<0||ci>=w*h||lb[ci]||!m[ci])continue;lb[ci]=li;const px=ci%w,py=(ci-px)/w;if(px<x0)x0=px;if(px>x1)x1=px;if(py<y0)y0=py;if(py>y1)y1=py;c++;if(c<40000){if(px>0)s.push(ci-1);if(px<w-1)s.push(ci+1);if(py>0)s.push(ci-w);if(py<h-1)s.push(ci+w)}}if(c>=M_/4)bl.push({x:x0,y:y0,w:x1-x0,h:y1-y0,cx:(x0+x1)/2,cy:(y0+y1)/2,a:c})}}return bl}
function mT(bl){const now=Date.now(),mt=new Set(),nt={};for(const b of bl){let bi=null,bd=120;for(const[id,o]of Object.entries(T)){if(mt.has(id))continue;const d=Math.hypot(b.cx-o.cx,b.cy-o.cy);if(d<bd){bd=d;bi=id}}if(bi){mt.add(bi);const p=T[bi],dt=(now-p.ls)/1e3,dx=b.cx-p.cx,dy=b.cy-p.cy,sp=dt>0?Math.hypot(dx,dy)/dt:0,ss=p.sp*.65+sp*.35,an=sp>3?Math.atan2(-dy,dx)*180/Math.PI:p.an,sl=b.a>5e3?"كبير":b.a>1500?"متوسط":"صغير";nt[bi]={...p,cx:b.cx,cy:b.cy,bb:[b.x,b.y,b.w,b.h],sp:ss,an,ls:now,a:b.a,sl,hi:[...p.hi.slice(-25),{cx:b.cx,cy:b.cy}]}}else{const id='m_'+(++ic),sl=b.a>5e3?"كبير":b.a>1500?"متوسط":"صغير";nt[id]={id,cx:b.cx,cy:b.cy,bb:[b.x,b.y,b.w,b.h],sp:0,an:null,ls:now,a:b.a,sl,co:CO[ic%CO.length],hi:[{cx:b.cx,cy:b.cy}]}}}for(const[id,o]of Object.entries(T))if(!nt[id]&&now-o.ls<500)nt[id]={...o,sp:o.sp*.8};T=nt}
function dr(){cx_.clearRect(0,0,cvs.width,cvs.height);for(const o of Object.values(T)){const[x,y,w,h]=o.bb,c=o.co;if(o.hi.length>2){cx_.beginPath();cx_.strokeStyle=c;cx_.lineWidth=2;cx_.globalAlpha=.3;o.hi.forEach((p,i)=>i?cx_.lineTo(p.cx,p.cy):cx_.moveTo(p.cx,p.cy));cx_.stroke();cx_.globalAlpha=1}cx_.strokeStyle=c;cx_.lineWidth=2;cx_.setLineDash([6,3]);cx_.strokeRect(x,y,w,h);cx_.setLineDash([]);const cn=Math.min(14,w/3,h/3);cx_.lineWidth=3;cx_.strokeStyle=c;cx_.beginPath();cx_.moveTo(x,y+cn);cx_.lineTo(x,y);cx_.lineTo(x+cn,y);cx_.moveTo(x+w-cn,y);cx_.lineTo(x+w,y);cx_.lineTo(x+w,y+cn);cx_.moveTo(x+w,y+h-cn);cx_.lineTo(x+w,y+h);cx_.lineTo(x+w-cn,y+h);cx_.moveTo(x+cn,y+h);cx_.lineTo(x,y+h);cx_.lineTo(x,y+h-cn);cx_.stroke();const lb=`${o.sl} ${dA(o.an)} ${Math.round(o.sp)} px/s`;cx_.font='600 12px sans-serif';const tw=cx_.measureText(lb).width+14,lh=22,lx=x,ly=y-lh-3;cx_.fillStyle='rgba(0,0,0,.75)';cx_.beginPath();cx_.roundRect(lx,ly,tw,lh,5);cx_.fill();cx_.strokeStyle=c;cx_.lineWidth=1;cx_.stroke();cx_.fillStyle=c;cx_.textBaseline='middle';cx_.textAlign='right';cx_.fillText(lb,lx+tw-7,ly+lh/2);cx_.beginPath();cx_.arc(o.cx,o.cy,4,0,Math.PI*2);cx_.fillStyle=c;cx_.fill();if(o.sp>8&&o.an!==null){const r=o.an*Math.PI/180,l=Math.min(o.sp*.4,50),ax=o.cx+Math.cos(r)*l,ay=o.cy-Math.sin(r)*l;cx_.beginPath();cx_.moveTo(o.cx,o.cy);cx_.lineTo(ax,ay);cx_.strokeStyle=c;cx_.lineWidth=2;cx_.stroke();cx_.beginPath();cx_.moveTo(ax,ay);cx_.lineTo(ax-Math.cos(r-.4)*8,ay+Math.sin(r-.4)*8);cx_.lineTo(ax-Math.cos(r+.4)*8,ay+Math.sin(r+.4)*8);cx_.closePath();cx_.fillStyle=c;cx_.fill()}}}
function uUI(ob){document.getElementById('sT').textContent=ob.length;if(ob.length){const sp=ob.map(o=>o.sp);document.getElementById('sA').textContent=Math.round(sp.reduce((a,b)=>a+b,0)/sp.length);document.getElementById('sM').textContent=Math.round(Math.max(...sp))}else{document.getElementById('sA').textContent='0';document.getElementById('sM').textContent='0'}const l=document.getElementById('objList');if(!ob.length){l.innerHTML='<div class="empty"><div style="font-size:2rem;opacity:.3;margin-bottom:6px">📡</div><div style="font-size:.78rem">حرّك جسماً أمام الكاميرا</div></div>';return}l.innerHTML=ob.sort((a,b)=>b.sp-a.sp).map(o=>`<div class="oi"><div style="width:7px;height:7px;border-radius:50%;background:${o.co}"></div><div style="flex:1"><div style="font-size:.75rem;font-weight:700;color:${o.co}">${o.sl}</div><div style="font-size:.58rem;color:#90a4ae">${dTx(o.an)} · ${o.a}px</div></div><div style="font-size:1rem;color:${o.co};width:20px;text-align:center">${dA(o.an)}</div><div style="font-size:.75rem;font-weight:700;color:${o.sp>80?'#ff3366':o.sp>30?'#ffd600':'#00ff88'}">${Math.round(o.sp)}</div></div>`).join('')}
function run(){if(!on)return;if(!vid||vid.paused){af=requestAnimationFrame(run);return}const w=vid.videoWidth,h=vid.videoHeight;oX.drawImage(vid,0,0,w,h);const cur=oX.getImageData(0,0,w,h);if(pF){const p=pF.data,c=cur.data,di=dX.createImageData(w,h),d=di.data;for(let i=0;i<c.length;i+=4){d[i]=Math.abs(c[i]-p[i]);d[i+1]=Math.abs(c[i+1]-p[i+1]);d[i+2]=Math.abs(c[i+2]-p[i+2]);d[i+3]=255}mT(fB(d,w,h));dr();fc++;const now=Date.now();if(now-ft>=1e3){document.getElementById('fpsH').textContent='FPS: '+fc;fc=0;ft=now}if(fc%4===0)uUI(Object.values(T))}pF=cur;af=requestAnimationFrame(run)}
init();
</script>
</body>
</html>
